<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- Fond vert émeraude -->
  <rect width="1024" height="1024" fill="#00A86B" rx="230" ry="230"/>

  <!-- Remplissage intérieur doré — lueur pièce -->
  <circle cx="512.000" cy="512.000" r="369.664"
          fill="#D4AF37" opacity="0.2"/>

  <!-- Cercle extérieur (contour pièce) -->
  <circle cx="512.000" cy="512.000" r="379.904"
          fill="none" stroke="#D4AF37" stroke-width="34.816" opacity="0.9"/>

  <!-- Cercle intérieur (détail pièce) -->
  <circle cx="512.000" cy="512.000" r="300.032"
          fill="none" stroke="#D4AF37" stroke-width="15.360" opacity="0.5"/>

  <!-- Aiguille minute — blanche, 12h -->
  <line x1="512.000" y1="563.200"
        x2="512.000"  y2="186.368"
        stroke="#FFFFFF" stroke-width="79.872" stroke-linecap="round"/>

  <!-- Aiguille heure — dorée, 2h -->
  <line x1="476.528" y1="532.480"
        x2="714.193"  y2="395.264"
        stroke="#D4AF37" stroke-width="60.416" stroke-linecap="round"/>

  <!-- Point central blanc -->
  <circle cx="512.000" cy="512.000" r="50.176"
          fill="#FFFFFF"/>

</svg>